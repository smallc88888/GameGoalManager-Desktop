<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>玩家通关里程碑</title>
    <style>
        /* ==========================================
         * 1. 基础长图设定 (Famicom Light 主题)
         * ========================================== */
        body {
            background-color: #F5F5F7; /* 极客风浅灰底色 */
            margin: 0;
            padding: 60px 80px; /* 四周留出呼吸感 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            width: 1200px; /* 锁死物理宽度，确保每次截图排版一致 */
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            border-bottom: 4px solid #E60012;
            padding-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 42px; color: #111; letter-spacing: 3px; font-weight: 900; }
        .header p { color: #666; font-size: 18px; margin-top: 15px; font-weight: bold; }

        /* ==========================================
         * 2. 蛇形布局核心Flexbox
         * ========================================== */
        .timeline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timeline-row {
            display: flex;
            justify-content: center;
            gap: 60px; /* 节点之间的横向间距 */
            margin-bottom: 80px; /* 节点之间的纵向间距（留给向下箭头） */
            position: relative;
        }

        /* ==========================================
         * 3. 通关记录单元件 (Node Card)
         * ========================================== */
        .node {
            width: 280px; /* 锁死单卡宽度 */
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            display: flex;
            flex-direction: column;
            border-top: 6px solid #E60012; /* 任天堂红卡带顶 */
            overflow: hidden;
        }

        .node-date {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 核心容器： 16:9 + contain 填充 */
        .screenshot-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #E8E8ED; /* 留白处的底色 */
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #eee;
        }

        .screenshot-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保证原图不被裁切 */
        }

        .node-info {
            padding: 15px;
            text-align: center;
        }

        .node-title {
            font-size: 18px;
            font-weight: 800;
            color: #222;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .node-meta {
            font-size: 13px;
            color: #666;
            font-weight: 600;
        }
        .node-meta span { color: #E60012; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 通关里程碑</h1>
        <p>GameGoalManager已见证您的 <span style="color: #E60012; font-size: 24px; font-weight: 900; margin: 0 4px;">{{ total_count }}</span> 次通关</p>
    </div>

    <div class="timeline-container">
        {% for row in timeline_data | batch(3) %}

            <div class="timeline-row {% if loop.index0 % 2 != 0 %}reverse{% endif %}">

                {% for item in row %}
                    <div class="node">
                        <div class="node-date">📅 {{ item.date }}</div>
                        <div class="screenshot-container">
                            <img src="{{ item.screenshot_path }}" alt="screenshot"/>
                        </div>
                        <div class="node-info">
                            <div class="node-title">{{ item.title }}</div>
                        </div>
                    </div>
                {% endfor %}

            </div>
        {% endfor %}
    </div>

</body>
</html>
